<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-BRAIN AI REPORT EDITOR</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background-color: #F4F7FB;
            background-image: radial-gradient(circle at 100% 0%, rgba(57, 230, 253, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(69, 63, 232, 0.05) 0%, transparent 40%);
        }

        .dashboard-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .dashboard-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 56px;
        }

        .dashboard-brand {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dashboard-brand h1 {
            font-size: 32px;
            font-weight: 800;
            color: #002D54;
            letter-spacing: -0.03em;
        }

        .dashboard-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 45, 84, 0.06);
            border: 1px solid rgba(0, 45, 84, 0.05);
        }

        .boards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .board-card {
            background: #FFFFFF;
            border: 1px solid rgba(0, 45, 84, 0.08);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0, 45, 84, 0.04), 0 2px 10px rgba(0, 45, 84, 0.03);
            position: relative;
            overflow: hidden;
        }

        .board-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .board-card:nth-child(1)::before {
            background: linear-gradient(90deg, #453FE8, #44A4FF);
        }

        .board-card:nth-child(2)::before {
            background: linear-gradient(90deg, #10b981, #39E6FD);
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 45, 84, 0.06);
        }

        .board-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #002D54;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .report-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .report-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: #F8F9FB;
            border: 1px solid rgba(0, 45, 84, 0.06);
            border-radius: 16px;
            text-decoration: none;
            color: #002D54;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .report-item:hover {
            background: #FFFFFF;
            border-color: #44A4FF;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(68, 164, 255, 0.15);
        }

        .report-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .report-date {
            font-weight: 700;
            font-size: 16px;
            color: #453FE8;
        }

        .report-headline {
            font-size: 14px;
            color: #4b5563;
            max-width: 340px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Re-use status badges from style.css */
        .btn-create-new {
            background: linear-gradient(135deg, #453FE8, #44A4FF);
            color: #FFFFFF;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(69, 63, 232, 0.2);
        }

        .btn-create-new:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(69, 63, 232, 0.3);
            filter: brightness(1.05);
        }

        .status-badge {
            padding: 6px 14px;
            font-size: 11px;
            border-radius: 99px;
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="spinner-lg"></div>
            <span class="loading-label" id="loadingLabel">리포트 현황을 불러오는 중...</span>
        </div>
    </div>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="dashboard-brand">
                <div class="dashboard-logo">
                    <img src="https://pub-03167621cdbf4cc3bd490e069b232ca3.r2.dev/reports/KBRAIN%20CI.png" alt="K-BRAIN"
                        style="height:48px;">
                </div>
                <h1>AI REPORT EDITOR</h1>
            </div>
        </header>

        <div class="boards-grid">
            <!-- Daily Reports -->
            <section class="board-card">
                <div class="board-header">
                    <h2>데일리 리포트 (Daily)</h2>
                    <a href="daily.html" class="btn-create-new">에디터 열기</a>
                </div>
                <div class="report-list" id="dailyList">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Weekly Reports -->
            <section class="board-card">
                <div class="board-header">
                    <h2>위클리 리포트 (Weekly)</h2>
                    <a href="weekly.html" class="btn-create-new">에디터 열기</a>
                </div>
                <div class="report-list" id="weeklyList">
                    <!-- Populated by JS -->
                </div>
            </section>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
